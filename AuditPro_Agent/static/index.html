<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuditPro AI Agent</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid #333;
        }
        header h1 {
            color: #00d9ff;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        header p { color: #888; }
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin: 20px 0;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #0f0;
        }
        .status-dot.offline { background: #f00; }
        .chat-container {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
            margin: 20px 0;
        }
        .messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 12px;
            line-height: 1.5;
        }
        .message.user {
            align-self: flex-end;
            background: #00d9ff;
            color: #000;
        }
        .message.assistant {
            align-self: flex-start;
            background: #333;
        }
        .message.error {
            background: #ff4444;
            color: #fff;
        }
        .input-area {
            display: flex;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #222;
            color: #fff;
            font-size: 16px;
        }
        .input-area input::placeholder { color: #666; }
        .input-area button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #00d9ff;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-area button:hover { background: #00b8d4; }
        .input-area button:disabled { background: #555; cursor: not-allowed; }
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .module-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .module-card h3 { color: #00d9ff; margin-bottom: 8px; }
        .module-card p { font-size: 14px; color: #888; }
        .upload-zone {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
            transition: border-color 0.2s;
        }
        .upload-zone:hover { border-color: #00d9ff; }
        .upload-zone.dragover { border-color: #00d9ff; background: rgba(0,217,255,0.1); }
        .result-box {
            background: #1a1a2e;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
        .tabs { display: flex; gap: 10px; margin: 20px 0; }
        .tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
        }
        .tab.active { background: #00d9ff; color: #000; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AuditPro AI Agent</h1>
            <p>Automatisation d'audit pilotée par IA avec Ollama</p>
        </header>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Connecting...</span>
            </div>
            <div class="status-item">
                <span>Modules: <strong id="modules-count">0</strong></span>
            </div>
            <div class="status-item">
                <span>Model: <strong id="model-name">-</strong></span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('chat')">💬 Chat</button>
            <button class="tab" onclick="switchTab('modules')">📦 Modules</button>
            <button class="tab" onclick="switchTab('upload')">📁 Upload</button>
        </div>

        <div id="chat" class="tab-content active">
            <div class="chat-container">
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <input type="text" id="chat-input" placeholder="Décrivez votre tâche d'audit..." onkeypress="if(event.key==='Enter')sendMessage()">
                    <button id="send-btn" onclick="sendMessage()">Envoyer</button>
                </div>
            </div>
        </div>

        <div id="modules" class="tab-content">
            <div class="modules-grid" id="modules-grid"></div>
        </div>

        <div id="upload" class="tab-content">
            <div class="upload-zone" id="upload-zone" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                <p>📁 Glissez-déposez un fichier Excel ou CSV ici</p>
                <p style="color:#666;font-size:14px;margin-top:10px">ou cliquez pour sélectionner</p>
                <input type="file" id="file-input" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFileSelect(event)">
                <button onclick="document.getElementById('file-input').click()" style="margin-top:15px;padding:10px 20px;background:#00d9ff;border:none;border-radius:8px;cursor:pointer">Sélectionner un fichier</button>
            </div>
            <div id="upload-result" style="display:none">
                <h3>Résultat de l'analyse</h3>
                <div class="result-box" id="upload-result-content"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let conversation = [];

        async function checkStatus() {
            try {
                const resp = await fetch(`${API_BASE}/health`);
                const data = await resp.json();
                document.getElementById('status-dot').classList.toggle('offline', !data.ollama);
                document.getElementById('status-text').textContent = data.ollama ? 'En ligne' : 'Ollama hors ligne';
                document.getElementById('modules-count').textContent = data.modules_loaded;
            } catch {
                document.getElementById('status-dot').classList.add('offline');
                document.getElementById('status-text').textContent = 'Hors ligne';
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().includes(tab)));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === tab));
            if (tab === 'modules') loadModules();
        }

        async function loadModules() {
            try {
                const resp = await fetch(`${API_BASE}/modules`);
                const modules = await resp.json();
                const grid = document.getElementById('modules-grid');
                grid.innerHTML = modules.map(m => `
                    <div class="module-card">
                        <h3>${m.name}</h3>
                        <p>${m.description}</p>
                        <p style="margin-top:8px;font-size:12px;color:#666">Catégorie: ${m.category}</p>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Failed to load modules:', e);
            }
        }

        function addMessage(content, role) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = content;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            input.value = '';
            addMessage(message, 'user');
            conversation.push({ role: 'user', content: message });

            const btn = document.getElementById('send-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>';

            try {
                const resp = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, conversation })
                });
                const data = await resp.json();

                if (data.error) {
                    addMessage(`Erreur: ${data.error}`, 'error');
                } else {
                    addMessage(data.response, 'assistant');
                    if (data.module_used) {
                        addMessage(`📦 Module utilisé: ${data.module_used}`, 'assistant');
                    }
                    conversation.push({ role: 'assistant', content: data.response });
                }
            } catch (e) {
                addMessage(`Erreur de connexion: ${e.message}`, 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Envoyer';
        }

        function handleDragOver(e) {
            e.preventDefault();
            document.getElementById('upload-zone').classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            document.getElementById('upload-zone').classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            document.getElementById('upload-zone').classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) uploadFile(file);
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) uploadFile(file);
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            const resultDiv = document.getElementById('upload-result');
            const resultContent = document.getElementById('upload-result-content');

            resultDiv.style.display = 'block';
            resultContent.textContent = 'Upload en cours...';

            try {
                const resp = await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
                const data = await resp.json();
                resultContent.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                resultContent.textContent = `Erreur: ${e.message}`;
            }
        }

        // Init
        checkStatus();
        setInterval(checkStatus, 30000);
        addMessage('Bonjour! Je suis votre assistant AuditPro. Décrivez votre tâche d\'audit et je m\'occupe du reste.', 'assistant');
    </script>
</body>
</html>
